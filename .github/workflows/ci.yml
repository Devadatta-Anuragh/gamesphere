name: CI

# Runs on every PR and on pushes to main. Path filtering means the API and
# web jobs only run when their code (or shared/root config) actually changes.
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect which parts of the monorepo changed. Shared package / lockfile /
  # root tsconfig changes fan out to BOTH apps (both depend on them).
  changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            shared: &shared
              - 'packages/shared/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.base.json'
              - 'eslint.config.js'
              - '.github/workflows/ci.yml'
            api:
              - *shared
              - 'apps/api/**'
            web:
              - *shared
              - 'apps/web/**'

  api:
    needs: changes
    if: ${{ needs.changes.outputs.api == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm exec eslint apps/api packages/shared
      - name: Typecheck
        run: pnpm --filter @gamesphere/api typecheck
      - name: Test
        run: pnpm --filter @gamesphere/api test

  web:
    needs: changes
    if: ${{ needs.changes.outputs.web == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm --filter @gamesphere/web typecheck
      - name: Build
        # Same-origin build flag mirrors production; just proves it compiles.
        env:
          NEXT_PUBLIC_API_URL: ""
        run: pnpm --filter @gamesphere/web build
