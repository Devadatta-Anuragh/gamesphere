name: Deploy

# Deploys to the EC2 box via AWS SSM Run Command (no inbound SSH needed).
# Fires on pushes to main that touch app/shared code, plus manual dispatch.
on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy via SSM Run Command
        env:
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
        run: |
          set -euo pipefail

          # Remote script: pull latest main, reinstall, rebuild web (with the
          # box's own public IP baked in), and restart the services. Build runs
          # as the 'ubuntu' user (owns the files); systemctl runs as root (SSM).
          read -r -d '' SCRIPT <<'EOS' || true
          set -euxo pipefail
          TOKEN=$(curl -s -X PUT "http://169.254.169.254/latest/api/token" -H "X-aws-ec2-metadata-token-ttl-seconds: 60")
          IP=$(curl -s -H "X-aws-ec2-metadata-token: $TOKEN" http://169.254.169.254/latest/meta-data/public-ipv4)
          sudo -u ubuntu git -C /opt/gamesphere fetch --all --prune
          sudo -u ubuntu git -C /opt/gamesphere reset --hard origin/main
          sudo -u ubuntu env NEXT_PUBLIC_API_URL=http://$IP bash -lc 'cd /opt/gamesphere && pnpm install --frozen-lockfile && pnpm build:web'
          systemctl restart gamesphere-api gamesphere-web
          sleep 3
          systemctl --no-pager --lines=5 status gamesphere-api gamesphere-web
          EOS

          PARAMS=$(jq -n --arg s "$SCRIPT" '{commands: ($s | split("\n"))}')

          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy ${GITHUB_SHA::7}" \
            --parameters "$PARAMS" \
            --query "Command.CommandId" --output text)
          echo "SSM CommandId: $CMD_ID"

          # Poll until the command finishes (up to ~10 min for a slow build).
          for _ in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
              --query Status --output text 2>/dev/null || echo Pending)
            echo "status=$STATUS"
            case "$STATUS" in
              Success) break ;;
              Failed|Cancelled|TimedOut)
                echo "::error::Deploy $STATUS"
                aws ssm get-command-invocation --command-id "$CMD_ID" \
                  --instance-id "$INSTANCE_ID" --query StandardErrorContent --output text
                exit 1 ;;
            esac
            sleep 10
          done

          echo "---- remote stdout ----"
          aws ssm get-command-invocation --command-id "$CMD_ID" \
            --instance-id "$INSTANCE_ID" --query StandardOutputContent --output text
